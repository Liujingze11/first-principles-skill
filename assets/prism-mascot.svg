<svg width="980" height="720" viewBox="0 0 980 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Prism mascot for First Principles Skill</title>
  <desc id="desc">An original prism engineer mascot that separates a blurry request into facts, assumptions, constraints, root cause and verified code.</desc>
