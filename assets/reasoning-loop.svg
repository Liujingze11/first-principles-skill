<svg width="1100" height="360" viewBox="0 0 1100 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Reasoning loop for AI coding agents</title>
  <desc id="desc">Problem, facts, assumptions, root cause, options, implementation, verification and rollback connected as a loop.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1100" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#ECFEFF"/>
    </linearGradient>
    <linearGradient id="line" x1="74" y1="166" x2="1026" y2="166" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06B6D4"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
  </defs>
  <rect width="1100" height="360" rx="28" fill="url(#panel)"/>
  <path d="M142 180H958" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
  <path d="M946 166L968 180L946 194" stroke="#10B981" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <g transform="translate(48 92)">
      <rect width="156" height="116" rx="18" fill="#FFFFFF" stroke="#BAE6FD"/>
      <text x="78" y="45" text-anchor="middle" fill="#0F172A" font-size="18" font-weight="800">Problem</text>
      <text x="78" y="76" text-anchor="middle" fill="#475569" font-size="13">What is real?</text>
    </g>
    <g transform="translate(178 214)">
      <rect width="156" height="88" rx="18" fill="#FFFFFF" stroke="#DDD6FE"/>
      <text x="78" y="38" text-anchor="middle" fill="#0F172A" font-size="17" font-weight="800">Facts</text>
      <text x="78" y="62" text-anchor="middle" fill="#475569" font-size="13">What is known?</text>
    </g>
    <g transform="translate(308 92)">
      <rect width="156" height="116" rx="18" fill="#FFFFFF" stroke="#DDD6FE"/>
      <text x="78" y="45" text-anchor="middle" fill="#0F172A" font-size="18" font-weight="800">Assumptions</text>
      <text x="78" y="76" text-anchor="middle" fill="#475569" font-size="13">What is guessed?</text>
    </g>
    <g transform="translate(472 214)">
      <rect width="156" height="88" rx="18" fill="#FFFFFF" stroke="#BBF7D0"/>
      <text x="78" y="38" text-anchor="middle" fill="#0F172A" font-size="17" font-weight="800">Root Cause</text>
      <text x="78" y="62" text-anchor="middle" fill="#475569" font-size="13">Why now?</text>
    </g>
    <g transform="translate(636 92)">
      <rect width="156" height="116" rx="18" fill="#FFFFFF" stroke="#BBF7D0"/>
      <text x="78" y="45" text-anchor="middle" fill="#0F172A" font-size="18" font-weight="800">Options</text>
      <text x="78" y="76" text-anchor="middle" fill="#475569" font-size="13">What could work?</text>
    </g>
    <g transform="translate(766 214)">
      <rect width="156" height="88" rx="18" fill="#FFFFFF" stroke="#FDE68A"/>
      <text x="78" y="38" text-anchor="middle" fill="#0F172A" font-size="17" font-weight="800">Implement</text>
      <text x="78" y="62" text-anchor="middle" fill="#475569" font-size="13">Smallest step</text>
    </g>
    <g transform="translate(896 92)">
      <rect width="156" height="116" rx="18" fill="#FFFFFF" stroke="#FDE68A"/>
      <text x="78" y="45" text-anchor="middle" fill="#0F172A" font-size="18" font-weight="800">Verify</text>
      <text x="78" y="76" text-anchor="middle" fill="#475569" font-size="13">Then roll back if needed</text>
    </g>
  </g>
</svg>
