<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">First-principles foundation model</title>
  <desc id="desc">An original illustration showing how AI coding agents build from facts, assumptions and constraints toward root cause, options, implementation and verification.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.48" stop-color="#F1F5F9"/>
      <stop offset="1" stop-color="#ECFEFF"/>
    </linearGradient>
    <linearGradient id="dark" x1="148" y1="106" x2="1040" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#164E63"/>
    </linearGradient>
    <linearGradient id="stack" x1="256" y1="466" x2="747" y2="162" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06B6D4"/>
      <stop offset="0.48" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#020617" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="640" rx="34" fill="url(#bg)"/>

  <g opacity="0.55">
    <path d="M78 124H1122" stroke="#CBD5E1" stroke-width="1"/>
    <path d="M78 254H1122" stroke="#CBD5E1" stroke-width="1"/>
    <path d="M78 384H1122" stroke="#CBD5E1" stroke-width="1"/>
    <path d="M180 64V576" stroke="#CBD5E1" stroke-width="1"/>
    <path d="M360 64V576" stroke="#CBD5E1" stroke-width="1"/>
    <path d="M540 64V576" stroke="#CBD5E1" stroke-width="1"/>
    <path d="M720 64V576" stroke="#CBD5E1" stroke-width="1"/>
    <path d="M900 64V576" stroke="#CBD5E1" stroke-width="1"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="76" y="72" width="1048" height="496" rx="30" fill="#FFFFFF" stroke="#E2E8F0"/>

    <text x="116" y="126" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="850">
      Build from fundamentals
    </text>
    <text x="118" y="164" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">
      A coding agent should climb from evidence to implementation, not jump from request to code.
    </text>

    <g transform="translate(126 214)">
      <path d="M44 268H594L511 204H127L44 268Z" fill="#0E7490"/>
      <path d="M116 196H522L458 142H180L116 196Z" fill="#6D28D9"/>
      <path d="M194 134H444L393 88H245L194 134Z" fill="#059669"/>
      <path d="M270 80H368L319 28L270 80Z" fill="#F59E0B"/>

      <path d="M44 268H594L511 204H127L44 268Z" fill="url(#stack)" opacity="0.76"/>
      <path d="M116 196H522L458 142H180L116 196Z" fill="url(#stack)" opacity="0.84"/>
      <path d="M194 134H444L393 88H245L194 134Z" fill="url(#stack)" opacity="0.94"/>
      <path d="M270 80H368L319 28L270 80Z" fill="#FBBF24"/>

      <text x="319" y="252" text-anchor="middle" fill="#ECFEFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="21" font-weight="850">FACTS  +  ASSUMPTIONS  +  CONSTRAINTS</text>
      <text x="319" y="180" text-anchor="middle" fill="#F5F3FF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="21" font-weight="850">ROOT CAUSE</text>
      <text x="319" y="118" text-anchor="middle" fill="#ECFDF5" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="850">OPTIONS + TRADEOFFS</text>
      <text x="319" y="70" text-anchor="middle" fill="#422006" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="900">VERIFIED CODE</text>
    </g>

    <g transform="translate(794 214)">
      <rect width="240" height="270" rx="20" fill="url(#dark)"/>
      <text x="28" y="48" fill="#F8FAFC" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="17" font-weight="800">first principles</text>
      <rect x="28" y="70" width="184" height="2" fill="#38BDF8" opacity="0.5"/>
      <text x="28" y="106" fill="#BAE6FD" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14">request != problem</text>
      <text x="28" y="136" fill="#DDD6FE" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14">facts > guesses</text>
      <text x="28" y="166" fill="#BBF7D0" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14">cause > symptom</text>
      <text x="28" y="196" fill="#FDE68A" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14">small > clever</text>
      <text x="28" y="226" fill="#F8FAFC" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14">verify > vibe</text>
    </g>
  </g>
</svg>
